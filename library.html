<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Digital Library</title>
    <link rel="stylesheet" href="script.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar glass">
        <div class="logo">
            <h2>Sigma <span>Library</span></h2>
            <p class="subtitle">By Alok Sir</p>
        </div>
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search by class, subject, or chapter...">
        </div>
        <button id="themeToggle" class="icon-btn"><i class="fas fa-moon"></i></button>
    </nav>

    <main class="container">
        <section class="class-selector">
            <button class="class-btn active" data-class="class9">Class 9</button>
            <button class="class-btn" data-class="class10">Class 10</button>
            <button class="class-btn" data-class="class11">Class 11</button>
            <button class="class-btn" data-class="class12">Class 12</button>
        </section>

        <div id="contentArea" class="grid">
            </div>
    </main>

    <footer class="glass">
        <div class="footer-content">
            <p>&copy; 2026 Sigma Classes. All rights reserved.</p>
            <div class="footer-links">
                <a href="#">About</a>
                <a href="#">Contact</a>
                <a href="#">Privacy Policy</a>
            </div>
        </div>
    </footer>

    <div id="pdfModal" class="modal">
        <div class="modal-content glass">
            <span class="close-btn">&times;</span>
            <h3 id="modalTitle">PDF Preview</h3>
            <div class="iframe-container">
                <iframe id="pdfIframe" src="" width="100%" height="600px" frameborder="0"></iframe>
            </div>
        </div>
    </div>

    <a href="https://wa.me/YOUR_PHONE_NUMBER" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script src="libraryData.js"></script>
    <script src="script.js"></script>
</body>
</html>
